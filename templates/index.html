<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyMock Interview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            width: 64px;
            height: 64px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-slate-950 text-slate-200 font-sans selection:bg-emerald-500/30">
    <header class="border-b border-slate-800/60 bg-slate-950/50 backdrop-blur-md sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center border border-emerald-500/20">
                    <i data-lucide="terminal" class="w-4 h-4 text-emerald-400"></i>
                </div>
                <span class="font-semibold text-slate-100 tracking-tight">PyMock Interview</span>
            </div>

            <div id="header-right"></div>
        </div>
    </header>

    <!-- Cancel Modal -->
    <div id="cancel-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-sm px-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl transition-all scale-95 opacity-0"
            id="cancel-modal-content">
            <h3 class="text-lg font-semibold text-white mb-6 text-center" id="lang-cancelConfirm"></h3>
            <div class="flex gap-3">
                <button onclick="hideCancelModal()"
                    class="flex-1 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-medium transition-colors"
                    id="lang-noKeep"></button>
                <button onclick="handleCancel()"
                    class="flex-1 px-4 py-2.5 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-xl font-medium transition-colors border border-red-500/20"
                    id="lang-yesCancel"></button>
            </div>
        </div>
    </div>

    <main class="max-w-5xl mx-auto px-6 py-12" id="app-content"></main>

                realQuestions: "Haqiqiy savollar",
                realQuestionsDesc: "Haqiqiy IT kompaniyalari intervyularidan olingan.",

                textBasedDesc: "Javoblaringizni xuddi uy vazifasi kabi yozing.",
                levelAssessment: "Darajani baholash",

                back: "Ortga",

                analyzingDesc: "Bizning AI sizning texnik chuqurligingizni, aniqligingizni va to'g'riligingizni baholamoqda...",
                assessedLevel: "Baholangan daraja",
                detailedFeedback: "Batafsil fikr-mulohaza",
                yourAnswer: "Sizning javobingiz",
                aiFeedback: "AI Fikri",
                noAnswer: "Javob berilmagan.",
                tryAnother: "Yana bir bor urinib ko'rish",
                loading: "Savollar yuklanmoqda...",
                cancel: "Intervyuni bekor qilish",
                cancelConfirm: "Intervyuni bekor qilishga ishonchingiz komilmi?",
                yesCancel: "Ha, bekor qilish",
                noKeep: "Yo'q, davom etish",
                cancelTitle: "Intervyu bekor qilindi",
                cancelDesc: "Siz jarayonni erta to'xtatdingiz, ammo har bir qadam bu katta tajriba! Mana siz javob berishga ulgurgan savollar xulosasi.",
                motivationalMessage: "Taslim bo'lmang! Haqiqiy intervyular juda qiyin bo'ladi va bunday mashqlar aynan o'sha qiyinchiliklarga tayyorlaydi. O'rganishda davom eting, kod yozishdan to'xtamang. Tayyor bo'lganingizda yana urinib ko'ring. Siz buni uddalaysiz! 🚀",
                assessedLevelCancel: "Joriy natija darajasi",
                statsTotal: "Jami savollar",
                statsCorrect: "To'g'ri",
                statsWrong: "Xato",

                aiFeedback: "INTERVYUER TAHLILI"

        };

        let state = {
            step: 'landing',
            language: 'uz',
            questions: [],
            currentQuestionIndex: 0,
            answers: {},
            currentAnswer: '',
            isEvaluating: false,
            isLoading: false,
            evaluationResult: null,
            isCancelledProgress: false
        };

        function setState(newState) {
            state = { ...state, ...newState };
            render();
        }

        const t = () => TRANSLATIONS[state.language];

        async function handleStart() {
            setState({ isLoading: true });
            try {
                const response = await fetch('/api/questions?count=25');
                if (!response.ok) throw new Error('Network response was not ok');
                const questions = await response.json();
                setState({
                    questions,
                    step: 'interview',
                    currentQuestionIndex: 0,
                    answers: {},
                    currentAnswer: '',
                    evaluationResult: null,
                    isLoading: false
                });
            } catch (error) {
                console.error('Failed to load questions:', error);
                alert('Failed to load questions. Please try again.');
                setState({ isLoading: false });
            }
        }

        function handleNextQuestion() {
            const textarea = document.getElementById('answer-textarea');
            const currentVal = textarea ? textarea.value : state.currentAnswer;

            const newAnswers = { ...state.answers, [state.questions[state.currentQuestionIndex].id]: currentVal };

            if (state.currentQuestionIndex < state.questions.length - 1) {
                setState({
                    answers: newAnswers,
                    currentQuestionIndex: state.currentQuestionIndex + 1,
                    currentAnswer: newAnswers[state.questions[state.currentQuestionIndex + 1].id] || ''
                });
            } else {
                handleFinish(newAnswers);
            }
        }

        function handlePrevQuestion() {
            if (state.currentQuestionIndex > 0) {
                const textarea = document.getElementById('answer-textarea');
                const currentVal = textarea ? textarea.value : state.currentAnswer;

                const newAnswers = { ...state.answers, [state.questions[state.currentQuestionIndex].id]: currentVal };
                setState({
                    answers: newAnswers,
                    currentQuestionIndex: state.currentQuestionIndex - 1,
                    currentAnswer: newAnswers[state.questions[state.currentQuestionIndex - 1].id] || ''
                });
            }
        }

        async function handleFinish(finalAnswers, questionsOverride) {
            const questionsToEval = questionsOverride || state.questions;
            setState({ answers: finalAnswers, step: 'results', isEvaluating: true });
            try {
                const response = await fetch('/api/evaluate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        language: state.language,
                        answers: finalAnswers,
                        questions: questionsToEval.map(q => {
                            let textForLang = "Question text missing";
                            if (typeof q.text === 'object') {
                                textForLang = q.text[state.language] || q.text['en'] || q.text['uz'] || Object.values(q.text)[0] || "Question text missing";
                            } else if (typeof q.text === 'string') {
                                textForLang = q.text;
                            }
                            return { id: q.id, text: textForLang };
                        })
                    })
                });
                if (!response.ok) throw new Error('Evaluation failed');
                const result = await response.json();
                setState({ evaluationResult: result, isEvaluating: false });
            } catch (error) {
                console.error(error);
                setState({
                    evaluationResult: { level: 'Error', summary: 'Failed to evaluate. Please try again later.', feedback: [] },
                    isEvaluating: false
                });
            }
        }

        function showCancelModal() {
            const modal = document.getElementById('cancel-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('cancel-modal-content').classList.remove('scale-95', 'opacity-0');
                document.getElementById('cancel-modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);
            document.getElementById('lang-cancelConfirm').innerText = t().cancelConfirm;
            document.getElementById('lang-noKeep').innerText = t().noKeep;
            document.getElementById('lang-yesCancel').innerText = t().yesCancel;
        }

        function hideCancelModal() {
            document.getElementById('cancel-modal-content').classList.remove('scale-100', 'opacity-100');
            document.getElementById('cancel-modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                document.getElementById('cancel-modal').classList.add('hidden');
            }, 200);
        }

        function handleCancel() {
            hideCancelModal();

            // Collect answers provided so far
            const textarea = document.getElementById('answer-textarea');
            const currentVal = textarea ? textarea.value : state.currentAnswer;

            let currentAnswersContext = { ...state.answers };
            if (currentVal && currentVal.trim() !== '') {
                const currentQuestionId = state.questions[state.currentQuestionIndex].id;
                currentAnswersContext[currentQuestionId] = currentVal;
            }

            if (Object.keys(currentAnswersContext).length === 0) {
                // If they didn't answer anything at all, just go back to landing
                setState({
                    step: 'landing',
                    currentQuestionIndex: 0,
                    answers: {},
                    currentAnswer: '',
                    evaluationResult: null,
                    isCancelledProgress: false
                });
                return;
            }

            // Keep only questions that were actually answered or viewed up to this point
            const answeredQuestions = state.questions.slice(0, Math.max(Object.keys(currentAnswersContext).length, state.currentQuestionIndex + 1));

            // Set state to cancelled results mode and trigger evaluation
            setState({
                questions: answeredQuestions,
                answers: currentAnswersContext,
                step: 'results',
                isEvaluating: true,
                isCancelledProgress: true
            });

            // Proceed to evaluate what they have so far
            handleFinish(currentAnswersContext, answeredQuestions);
        }

        function renderHeaderRight() {
            const headerRight = document.getElementById('header-right');
            if (state.step === 'landing') {
                headerRight.innerHTML = `
            <div class="flex items-center gap-2 bg-slate-900 border border-slate-800 rounded-lg p-1">
                <i data-lucide="globe" class="w-4 h-4 text-slate-400 ml-2"></i>
                <select id="lang-select" onchange="setState({language: this.value})" class="bg-transparent text-sm font-medium text-slate-300 focus:outline-none py-1 pr-2 cursor-pointer">
                    <option value="uz" ${state.language === 'uz' ? 'selected' : ''}>O'zbekcha</option>
                    <option value="en" ${state.language === 'en' ? 'selected' : ''}>English</option>
                    <option value="ru" ${state.language === 'ru' ? 'selected' : ''}>Русский</option>
                </select>
            </div>
        `;
            } else if (state.step === 'interview' && state.questions.length > 0) {
                headerRight.innerHTML = `
            <div class="flex items-center gap-4">
                <div class="text-sm font-medium text-slate-400">
                    ${t().question} ${state.currentQuestionIndex + 1} ${t().of} ${state.questions.length}
                </div>
                <button onclick="showCancelModal()" class="text-sm font-medium text-red-400 hover:text-red-300 px-3 py-1.5 rounded-lg hover:bg-red-400/10 transition-colors">
                    ${t().cancel}
                </button>
            </div>
        `;
            } else {
                headerRight.innerHTML = '';
            }
        }

        function renderLanding() {
            return `
        <div class="max-w-2xl mx-auto text-center mt-12 fade-in">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm font-medium mb-8">
                <i data-lucide="brain-circuit" class="w-4 h-4"></i>
                <span>AI-Powered Evaluation</span>
            </div>
            <h1 class="text-5xl font-bold text-white mb-6 tracking-tight leading-tight">
                ${t().title} <br />
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">
                  ${t().highlight}
                </span> ${t().subtitle}
            </h1>
            <p class="text-lg text-slate-400 mb-10 leading-relaxed">${t().desc}</p>
            
            <div class="grid sm:grid-cols-3 gap-4 mb-12 text-left">
                <div class="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                    <i data-lucide="code-2" class="w-6 h-6 text-emerald-400 mb-3"></i>
                    <h3 class="font-medium text-slate-200 mb-1">${t().realQuestions}</h3>
                    <p class="text-sm text-slate-500">${t().realQuestionsDesc}</p>
                </div>
                <div class="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                    <i data-lucide="terminal" class="w-6 h-6 text-cyan-400 mb-3"></i>
                    <h3 class="font-medium text-slate-200 mb-1">${t().textBased}</h3>
                    <p class="text-sm text-slate-500">${t().textBasedDesc}</p>
                </div>
                <div class="p-4 rounded-xl border border-slate-800 bg-slate-900/50">
                    <i data-lucide="award" class="w-6 h-6 text-indigo-400 mb-3"></i>
                    <h3 class="font-medium text-slate-200 mb-1">${t().levelAssessment}</h3>
                    <p class="text-sm text-slate-500">${t().levelAssessmentDesc}</p>
                </div>
            </div>

            <button onclick="handleStart()" ${state.isLoading ? 'disabled' : ''} class="inline-flex items-center gap-2 bg-emerald-500 hover:bg-emerald-400 text-slate-950 px-8 py-4 rounded-full font-semibold transition-all hover:scale-105 active:scale-95 shadow-[0_0_40px_-10px_rgba(16,185,129,0.5)] disabled:opacity-70 disabled:hover:scale-100">
                ${state.isLoading ? '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>' : '<i data-lucide="play" class="w-5 h-5"></i>'}
                ${state.isLoading ? t().loading : t().start}
            </button>
        </div>
    `;
        }

        function getQuestionText(q, lang) {
            let text = "Question text missing";
            if (typeof q.text === 'object') {
                text = q.text[lang] || q.text['en'] || q.text['uz'] || Object.values(q.text)[0] || "Question text missing";
            } else if (typeof q.text === 'string') {
                text = q.text;
            }
            return text;
        }

        function updateCharCount(val) {
            const counter = document.getElementById('char-counter');
            const nextBtn = document.getElementById('next-btn');
            if (counter) counter.innerText = val.length + ' ' + t().chars;
            if (nextBtn) nextBtn.disabled = val.trim().length === 0;
            state.currentAnswer = val; // Store it silently without triggering render
        }

        function renderInterview() {
            const q = state.questions[state.currentQuestionIndex];
            if (!q) return '';
            const progress = state.questions.length > 0 ? (state.currentQuestionIndex / state.questions.length) * 100 : 0;

            const questionText = getQuestionText(q, state.language);

            return `
        <div class="max-w-3xl mx-auto fade-in">
            <div class="w-full h-1 bg-slate-800 rounded-full mb-12 overflow-hidden">
                <div class="h-full bg-emerald-500 transition-all duration-500" style="width: ${progress}%"></div>
            </div>

            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl mb-6">
                <div class="flex items-start gap-4 mb-6">
                    <div class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center shrink-0 border border-slate-700">
                        <i data-lucide="brain-circuit" class="w-5 h-5 text-emerald-400"></i>
                    </div>
                    <div>
                        <h2 class="text-xl font-medium text-slate-200 leading-relaxed">
                            ${questionText}
                        </h2>
                    </div>
                </div>

                <div class="relative">
                    <textarea
                        id="answer-textarea"
                        oninput="updateCharCount(this.value)"
                        class="w-full h-64 bg-slate-950 border border-slate-800 rounded-xl p-5 text-slate-300 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 resize-none font-mono text-sm leading-relaxed"
                        placeholder="${t().typeAnswer}"
                    >${state.currentAnswer}</textarea>
                    <div id="char-counter" class="absolute bottom-4 right-4 text-xs text-slate-500 font-mono">
                        ${state.currentAnswer.length} ${t().chars}
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <button onclick="handlePrevQuestion()" ${state.currentQuestionIndex === 0 ? 'disabled' : ''} class="inline-flex items-center gap-2 text-slate-400 hover:text-white disabled:opacity-30 disabled:hover:text-slate-400 px-4 py-3 rounded-xl font-medium transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> ${t().back}
                </button>

                <button id="next-btn" onclick="handleNextQuestion()" ${state.currentAnswer.trim().length === 0 ? 'disabled' : ''} class="inline-flex items-center gap-2 bg-white text-slate-900 hover:bg-slate-200 disabled:opacity-50 disabled:hover:bg-white px-6 py-3 rounded-xl font-medium transition-colors">
                    ${state.currentQuestionIndex === state.questions.length - 1 ? t().submit : t().next} <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    `;
        }

        function renderResults() {
            if (state.isEvaluating) {
                return `
            <div class="max-w-3xl mx-auto flex flex-col items-center justify-center py-24 text-center fade-in">
                <div class="loader mb-8"></div>
                <h2 class="text-2xl font-semibold text-white mb-2">${t().analyzing}</h2>
                <p class="text-slate-400">${t().analyzingDesc}</p>
            </div>
        `;
            }

            const { level, summary, feedback } = state.evaluationResult || {};
            const isCancelled = state.isCancelledProgress;

            const feedbackHtml = state.questions.map((q, i) => {
                // Use loose == to handle int/string questionId mismatch from AI
                const item = (feedback || []).find(f => f.questionId == q.id);
                const questionText = getQuestionText(q, state.language);
                const hasAnswer = state.answers[q.id] && state.answers[q.id].trim().length > 0;
                // Normalize isCorrect to a real boolean
                const isCorrect = item ? (item.isCorrect === true || item.isCorrect === 'true') : null;

                return `
            <div class="bg-slate-900 border ${isCorrect === true ? 'border-emerald-800/40' : isCorrect === false ? 'border-red-900/40' : 'border-slate-800'} rounded-2xl p-6 overflow-hidden">
                <div class="flex items-center justify-between mb-6">
                    <div class="inline-flex items-center gap-2 bg-slate-800 text-slate-400 rounded-lg px-3 py-1 text-sm font-bold border border-slate-700">
                        <span>${i + 1}</span>
                        <span class="opacity-50">-</span>
                        <span>${t().savol}</span>
                    </div>
                    ${isCorrect === true ? '<span class="shrink-0 inline-flex items-center gap-1 text-xs font-semibold text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 rounded-full px-2.5 py-1"><i data-lucide="check" class="w-3 h-3"></i> OK</span>' : isCorrect === false ? '<span class="shrink-0 inline-flex items-center gap-1 text-xs font-semibold text-red-400 bg-red-500/10 border border-red-500/20 rounded-full px-2.5 py-1"><i data-lucide="x" class="w-3 h-3"></i> Xato</span>' : ''}
                </div>

                <div class="space-y-6">
                    <h4 class="text-slate-200 font-medium leading-relaxed mb-4">${questionText}</h4>
                    
                    <div class="bg-slate-950 rounded-xl p-4 border border-slate-800/50">
                        <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold mb-2">${t().yourAnswer}</div>
                        <p class="text-slate-400 text-sm font-mono leading-relaxed">
                            ${state.answers[q.id] || t().noAnswer}
                        </p>
                    </div>
                    
                    ${item && hasAnswer ? `
                    <div class="grid sm:grid-cols-2 gap-4">
                        <div class="bg-emerald-500/5 rounded-xl p-4 border border-emerald-500/10 h-full">
                            <div class="flex items-center gap-2 text-xs text-emerald-400 uppercase tracking-wider font-semibold mb-2">
                                <i data-lucide="message-square" class="w-4 h-4"></i> ${t().aiFeedback}
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${item.aiFeedback}</p>
                        </div>
                        
                        <div class="bg-blue-500/5 rounded-xl p-4 border border-blue-500/10 h-full">
                            <div class="flex items-center gap-2 text-xs text-blue-400 uppercase tracking-wider font-semibold mb-2">
                                <i data-lucide="check-circle-2" class="w-4 h-4"></i> ${t().correctAnswer}
                            </div>
                            <p class="text-slate-300 text-sm leading-relaxed">${item.correctAnswer || '---'}</p>
                        </div>
                    </div>
                    ` : ''}
                </div>
            </div>
        `;
            }).join('');

            // Compute stats from feedback
            const totalCount = state.questions.length;
            // After backend normalization, isCorrect is strictly boolean
            const correctCount = (feedback || []).filter(f => f.isCorrect === true).length;
            const wrongCount = (feedback || []).filter(f => f.isCorrect === false).length;
            const correctPercent = totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0;

            const statsCard = `
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 text-center">
                    <div class="text-3xl font-bold text-white mb-1">${totalCount}</div>
                    <div class="text-xs text-slate-500 uppercase tracking-wider font-semibold">${t().statsTotal}</div>
                </div>
                <div class="bg-emerald-950/40 border border-emerald-800/40 rounded-2xl p-5 text-center">
                    <div class="text-3xl font-bold text-emerald-400 mb-1">${correctCount}</div>
                    <div class="text-xs text-emerald-600 uppercase tracking-wider font-semibold">${t().statsCorrect}</div>
                </div>
                <div class="bg-red-950/40 border border-red-900/40 rounded-2xl p-5 text-center">
                    <div class="text-3xl font-bold text-red-400 mb-1">${wrongCount}</div>
                    <div class="text-xs text-red-700 uppercase tracking-wider font-semibold">${t().statsWrong}</div>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-emerald-500 to-emerald-400 transition-all duration-700 rounded-full" style="width: ${correctPercent}%"></div>
            </div>
            `;

            const headerCard = isCancelled ? `
            <div class="bg-gradient-to-br from-amber-950/50 to-slate-950 border border-amber-800/40 rounded-3xl p-10 text-center relative overflow-hidden">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1/2 bg-amber-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-amber-500/10 border border-amber-500/20 mb-6 relative z-10">
                    <i data-lucide="circle-x" class="w-10 h-10 text-amber-400"></i>
                </div>
                
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-400 text-xs font-semibold uppercase tracking-wider mb-4 relative z-10">
                    <i data-lucide="flag" class="w-3 h-3"></i>
                    ${t().cancelTitle}
                </div>
                
                <h2 class="text-slate-400 font-medium mb-2 relative z-10">${t().assessedLevelCancel}</h2>
                <div class="text-5xl font-bold text-white mb-6 relative z-10 tracking-tight">${level || '—'}</div>
                
                <p class="text-slate-300 max-w-xl mx-auto leading-relaxed relative z-10 mb-4">${summary || ''}</p>
                <p class="text-slate-400 text-sm max-w-xl mx-auto leading-relaxed relative z-10">${t().cancelDesc}</p>
            </div>
            ` : `
            <div class="bg-gradient-to-br from-slate-900 to-slate-950 border border-slate-800 rounded-3xl p-10 text-center relative overflow-hidden">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1/2 bg-emerald-500/10 blur-[100px] rounded-full pointer-events-none"></div>
                
                <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 mb-6 relative z-10">
                    <i data-lucide="award" class="w-10 h-10 text-emerald-400"></i>
                </div>
                
                <h2 class="text-slate-400 font-medium mb-2 relative z-10">${t().assessedLevel}</h2>
                <div class="text-5xl font-bold text-white mb-6 relative z-10 tracking-tight">${level || 'Unknown'}</div>
                
                <p class="text-slate-300 max-w-xl mx-auto leading-relaxed relative z-10">${summary || ''}</p>
            </div>
            `;

            return `
        <div class="max-w-3xl mx-auto space-y-8 fade-in">
            ${headerCard}

            ${statsCard}

            ${isCancelled ? `
            <div class="bg-gradient-to-r from-amber-500/10 to-orange-500/5 border border-amber-500/20 rounded-2xl p-6 flex items-start gap-4">
                <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center shrink-0 border border-amber-500/20 mt-0.5">
                    <i data-lucide="flame" class="w-5 h-5 text-amber-400"></i>
                </div>
                <p class="text-slate-300 leading-relaxed text-sm">${t().motivationalMessage}</p>
            </div>
            ` : ''}

            <div class="space-y-4">
                <h3 class="text-xl font-semibold text-white mb-6 px-2">${t().detailedFeedback}</h3>
                ${feedbackHtml}
            </div>

            <div class="flex justify-center pt-8">
                <button onclick="setState({step: 'landing', isCancelledProgress: false, questions: [], answers: {}, evaluationResult: null})" class="inline-flex items-center gap-2 text-slate-400 hover:text-white transition-colors px-6 py-3">
                    <i data-lucide="refresh-ccw" class="w-4 h-4"></i> ${t().tryAnother}
                </button>
            </div>
        </div>
    `;
        }

        function render() {
            renderHeaderRight();
            const content = document.getElementById('app-content');
            if (state.step === 'landing') content.innerHTML = renderLanding();
            else if (state.step === 'interview') content.innerHTML = renderInterview();
            else if (state.step === 'results') content.innerHTML = renderResults();

            // Re-initialize Lucide icons for dynamically added HTML
            lucide.createIcons();
        }

        // Initial render
        render();
    </script>
</body>

</html>
