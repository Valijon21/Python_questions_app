{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyMock Interview — AI-Powered Technical Interviewer</title>

    <!-- Meta Tags for SEO -->
    <meta name="description"
        content="Master your next Python Backend interview with AI-powered simulations and professional feedback.">
    <meta name="keywords" content="Python, Django, Backend, Interview, AI, Gemini, Coding, Practice">

    <!-- CSS Library -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{% static 'api/css/main.css' %}">
</head>

<body class="min-h-screen text-slate-200 font-sans selection:bg-emerald-500/30">
    <!-- Premium Header -->
    <header class="border-b border-slate-800/60 bg-slate-950/50 backdrop-blur-md sticky top-0 z-10 glass">
        <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4 group cursor-pointer" onclick="setState({step: 'landing'})">
                <div
                    class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center border border-emerald-500/20 group-hover:bg-emerald-500/20 transition-all">
                    <i data-lucide="terminal" class="w-5 h-5 text-emerald-400"></i>
                </div>
                <div class="flex flex-col">
                    <span class="font-bold text-lg text-white tracking-tight">PyMock</span>
                    <span
                        class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest leading-none">Interview</span>
                </div>
            </div>

            <!-- Dynamic Header Right (Language select / Progress) -->
            <div id="header-right"></div>
        </div>
    </header>

    <!-- Global Cancel Modal -->
    <div id="cancel-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-md px-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-sm w-full shadow-2xl transition-all scale-95 opacity-0 glass"
            id="cancel-modal-content">
            <div
                class="w-16 h-16 rounded-2xl bg-red-500/10 flex items-center justify-center mb-6 mx-auto border border-red-500/20">
                <i data-lucide="alert-triangle" class="w-8 h-8 text-red-500"></i>
            </div>
            <h3 class="text-xl font-bold text-white mb-6 text-center leading-tight" id="lang-cancelConfirm"></h3>
            <div class="flex flex-col gap-3">
                <button onclick="hideCancelModal()"
                    class="w-full px-6 py-3.5 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-bold transition-all"
                    id="lang-noKeep"></button>
                <button onclick="handleCancel()"
                    class="w-full px-6 py-3.5 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-2xl font-bold transition-all border border-red-500/20"
                    id="lang-yesCancel"></button>
            </div>
        </div>
    </div>

    <!-- Main Content App -->
    <main class="max-w-5xl mx-auto px-6 py-12" id="app-content"></main>

    <!-- App Logic (ES Modules) -->
    <script type="module" src="{% static 'api/js/main.js' %}"></script>
</body>

</html>
